services:
  - type: web
    name: group-guard-bot
    runtime: node
    region: singapore
    plan: free
    rootDir: deploy
    buildCommand: echo "pre-built"
    startCommand: node --enable-source-maps index.mjs
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
